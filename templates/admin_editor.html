<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InspiroAI | Admin JSON Editor</title>

<!-- STATIC CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style_super.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style_pro.css') }}">

<!-- Prism Syntax Theme -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js" defer></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>

<style>
/* ---------------- BACKGROUND ---------------- */
body {
  background: radial-gradient(circle at 25% 25%, #030016, #060014);
  color: #e0ffff;
  font-family: "Poppins", sans-serif;
  margin: 0;
  padding: 0;
  animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0% { background: radial-gradient(circle at 30% 30%, #030016, #060014); }
  100% { background: radial-gradient(circle at 70% 70%, #060018, #100030); }
}

/* ---------------- TOPBAR ---------------- */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 28px;
  background: rgba(255,255,255,0.06);
  border-bottom:1px solid rgba(0,255,255,0.25);
  box-shadow:0 0 22px rgba(0,255,255,0.2);
  backdrop-filter: blur(16px);
  position:sticky;
  top:0;
  z-index:99;
}
.topbar-title {
  font-size:1.6rem;
  font-weight:600;
  background:linear-gradient(90deg,#00f0ff,#ff00f7);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color:transparent;
}
.topbar a {
  color:#cfeaff;
  margin-left:14px;
  font-size:0.95rem;
  text-decoration:none;
  transition:.25s;
}
.topbar a:hover {
  color:#00eaff;
  text-shadow:0 0 12px #00eaff;
}

/* ---------------- WRAPPER ---------------- */
.page-wrap { padding: 12px 22px 50px; }

.editor-container {
  background: rgba(255,255,255,0.07);
  padding:18px;
  border-radius:18px;
  box-shadow:0 0 40px rgba(0,255,255,0.20);
  backdrop-filter: blur(16px);
  max-width:1100px;
  margin:auto;
}

/* ---------------- TEXTAREA ---------------- */
textarea {
  width:100%;
  height:50vh;
  padding:15px;
  color:#00ffee;
  background:#000000cc;
  font-size:0.95rem;
  border:1px solid rgba(0,255,255,0.28);
  border-radius:14px;
  resize:none;
  outline:none;
  font-family:"Fira Code", monospace;
}

/* ---------------- BUTTONS ---------------- */
.btn {
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  border:none;
  color:white;
  padding:9px 18px;
  border-radius:12px;
  cursor:pointer;
  transition:.25s;
  font-weight:600;
}
.btn:hover { transform:scale(1.08); }

.btn.secondary {
  background:linear-gradient(90deg,#ff7ac8,#ffb347);
}

/* ---------------- PREVIEW ---------------- */
.preview-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:22px;
}
.code-preview-box {
  background:#000000bb;
  padding:12px;
  border-radius:14px;
  overflow:auto;
}
.preview-box {
  background:#ffffff0f;
  padding:16px;
  border-radius:16px;
  box-shadow:0 0 20px #00eeff33;
}
.preview-output {
  white-space:pre-wrap;
  background:#00000055;
  padding:12px;
  border-radius:10px;
  color:#00faff;
  border:1px solid rgba(0,255,255,0.2);
}

@media(max-width:900px){
  .preview-row { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-title">🧩 InspiroAI Admin</div>
  <div>
    <a href="/">Home</a>
    <a href="/free">Free</a>
    <a href="/pro">Pro</a>
    <a href="/comment-helper">Comments</a>
    <a href="#" style="opacity:.7;">Admin JSON</a>
  </div>
</div>

<div class="page-wrap">

  <h2>Caption Template JSON Editor</h2>

  <div class="editor-container">

    <!-- Toolbar -->
    <div class="toolbar" style="display:flex;justify-content:space-between;margin-bottom:10px;">
      <span style="color:#b8faff;">Safely edit tone templates. Use Format before saving.</span>
      <div>
        <button class="btn secondary" id="formatBtn">✨ Format</button>
        <button class="btn" id="minifyBtn">📦 Minify</button>
      </div>
    </div>

    <!-- JSON Editor -->
    <form id="jsonForm">
      <textarea id="jsonInput">{{ json_content }}</textarea>

      <div style="text-align:center;margin-top:14px;">
        <button class="btn" type="submit">💾 Save</button>
      </div>
    </form>

    <p id="statusMsg"></p>

    <!-- PREVIEW -->
    <div class="preview-row">

      <div class="code-preview-box">
        <pre><code id="jsonHighlight" class="language-json"></code></pre>
      </div>

      <div class="preview-box">
        <h3>🧪 Live Preview</h3>

        <div style="margin-bottom:12px;">
          <select id="langSelect" class="btn">
            <option value="en">English</option>
            <option value="bn">Bangla</option>
          </select>

          <select id="toneSelect" class="btn">
            <option value="professional">Professional</option>
            <option value="informative">Informative</option>
            <option value="promotional">Promotional</option>
            <option value="emotional">Emotional</option>
          </select>
        </div>

        <input id="sampleInput"
               placeholder="Enter sample caption…"
               style="width:100%;padding:10px;border-radius:10px;border:none;outline:none;">

        <button class="btn" id="previewBtn" type="button" style="margin-top:10px;">▶ Preview</button>

        <div id="previewOutput" class="preview-output"></div>
      </div>

    </div>

  </div>

</div>

<!-- GLOBAL JS -->
<script src="{{ url_for('static', filename='js/api_errors.js') }}"></script>
<script src="{{ url_for('static', filename='js/loader.js') }}"></script>
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script src="{{ url_for('static', filename='js/animations.js') }}"></script>
<script src="{{ url_for('static', filename='js/insights.js') }}"></script>

<script>
/* ---------- JSON HIGHLIGHT ---------- */
const textarea = document.getElementById("jsonInput");
const highlightBox = document.getElementById("jsonHighlight");

function refreshHighlight() {
  highlightBox.textContent = textarea.value;
  if (window.Prism) Prism.highlightElement(highlightBox);
}
textarea.addEventListener("input", refreshHighlight);

/* ---------- STATUS TEXT ---------- */
function setStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.style.color = type === "success" ? "#00ffaa" : "#ff6688";
}

/* ---------- FORMAT JSON ---------- */
document.getElementById("formatBtn").onclick = () => {
  try {
    textarea.value = JSON.stringify(JSON.parse(textarea.value), null, 2);
    refreshHighlight();
    setStatus("Formatted Successfully", "success");
  } catch { setStatus("Invalid JSON", "error"); }
};

/* ---------- MINIFY ---------- */
document.getElementById("minifyBtn").onclick = () => {
  try {
    textarea.value = JSON.stringify(JSON.parse(textarea.value));
    refreshHighlight();
    setStatus("Minified", "success");
  } catch { setStatus("Invalid JSON", "error"); }
};

/* ---------- SAVE JSON ---------- */
document.getElementById("jsonForm").onsubmit = async (e) => {
  e.preventDefault();

  try { JSON.parse(textarea.value); }
  catch { return setStatus("Fix JSON first!", "error"); }

  showLoader();

  const res = await safeFetch("/admin/save_json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: textarea.value })
  });

  hideLoader();

  if (!res.ok) return setStatus("Save failed", "error");

  const data = await res.json();
  if (data.message?.includes("Success"))
    setStatus("JSON Saved ✔", "success");
  else
    setStatus(data.message || "Save Error", "error");
};

/* ---------- LIVE PREVIEW ---------- */
document.getElementById("previewBtn").onclick = () => {
  const out = document.getElementById("previewOutput");

  try {
    const json = JSON.parse(textarea.value);
    const lang = document.getElementById("langSelect").value;
    const tone = document.getElementById("toneSelect").value;

    const pack = json?.[lang]?.[tone];
    if (!pack) return out.textContent = "⚠ Missing JSON Key";

    const caption = document.getElementById("sampleInput").value || "Sample caption…";

    out.innerHTML = `
      ${pack.prefix || ""}${caption}${pack.suffix || ""}
      <br><br><strong style="color:#ff77ff">Hashtags:</strong> ${pack.hashtags || ""}
    `;
  }
  catch { out.textContent = "Invalid JSON"; }
};

document.addEventListener("DOMContentLoaded", refreshHighlight);
</script>

</body>
</html>
